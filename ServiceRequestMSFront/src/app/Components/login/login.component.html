<section class="login-page">
  <div class="login-backdrop" style="top:-70px;left:-60px;width:280px;height:280px;background:rgba(23, 162, 184, 0.24);"></div>
  <div class="login-backdrop" style="right:-120px;bottom:-140px;width:360px;height:360px;background:rgba(255, 255, 255, 0.14);"></div>

  <div class="login-shell">
    <div class="login-topbar">
      <app-language-switcher></app-language-switcher>
    </div>
    <aside class="promo-panel">
      <div class="promo-badge">ServiceRequestMS</div>
      <h1>{{ 'LOGIN.PROMO_TITLE' | translate }}</h1>
      <p>{{ 'LOGIN.PROMO_DESC' | translate }}</p>

      <div class="promo-points">
      
        <div class="promo-point">
          <span class="point-icon">01</span>
          <span>{{ 'LOGIN.PROMO_POINT1' | translate }}</span>
        </div>
        <div class="promo-point">
          <span class="point-icon">02</span>
          <span>{{ 'LOGIN.PROMO_POINT2' | translate }}</span>
        </div>
      </div>
    </aside>

    <section class="login-card">
      <div class="card-header">
        <div class="card-mark">SR</div>
        <div>
          <p class="eyebrow">{{ 'LOGIN.WELCOME_BACK' | translate }}</p>
          <h2>{{ 'LOGIN.ADMIN_SIGNIN' | translate }}</h2>
        </div>
      </div>

      <form class="login-form" #loginForm="ngForm" (ngSubmit)="submitLogin()" novalidate>
        <label class="field-label" for="userName">{{ 'LOGIN.USERNAME' | translate }}</label>
        <div class="input-wrap">
          <input
            id="userName"
            name="userName"
            [(ngModel)]="credentials.userName"
            type="text"
            class="field-input"
            placeholder="{{ 'LOGIN.USERNAME_PLACEHOLDER' | translate }}"
            autocomplete="username"
            required />
        </div>

        <label class="field-label" for="password">{{ 'LOGIN.PASSWORD' | translate }}</label>
        <div class="input-wrap password-wrap">
          <input
            id="password"
            name="password"
            [(ngModel)]="credentials.password"
            [type]="showPassword ? 'text' : 'password'"
            class="field-input"
            placeholder="{{ 'LOGIN.PASSWORD_PLACEHOLDER' | translate }}"
            autocomplete="current-password"
            required />
          <button type="button" class="password-toggle" (click)="togglePasswordVisibility()">
            {{ showPassword ? ('LOGIN.HIDE' | translate) : ('LOGIN.SHOW' | translate) }}
          </button>
        </div>

        <button
          type="submit"
          class="login-button"
          [disabled]="isLoading || loginForm.invalid">
          <span *ngIf="!isLoading">{{ 'LOGIN.LOGIN_BUTTON' | translate }}</span>
          <span *ngIf="isLoading">{{ 'LOGIN.SIGNING_IN' | translate }}</span>
        </button>

        <p class="status-message" *ngIf="errorMessage">{{ errorMessage }}</p>
      </form>
    </section>
  </div>
</section>
